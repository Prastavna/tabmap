name: Release

# Build the TabMap .deb and attach it to a GitHub Release when a version tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build & package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so `git describe --tags` resolves the version

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build and package
        run: ./build/linux/package.sh deb

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabmap-deb-${{ matrix.arch }}
          path: build/bin/*.deb
          if-no-files-found: error

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*.deb
          generate_release_notes: true
